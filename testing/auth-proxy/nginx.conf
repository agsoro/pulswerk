# Fake Authelia auth proxy for testing
#
# Injects Remote-User/Name/Email/Groups headers as if Authelia had
# validated a session.
#
# Ports:
#   80 (Host 5001) → 'users' group (Standard User)
#   81 (Host 5002) → 'admins' group (Administrator)

# ── Port 80: Standard User (users group) ──────────────────────────
server {
    listen 80;
    server_name _;

    location /plswk/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Simulated Authelia identity headers
        proxy_set_header Remote-User       "testuser";
        proxy_set_header Remote-Name       "Test User";
        proxy_set_header Remote-Email      "user@pulswerk.local";
        proxy_set_header Remote-Groups     "users,viewers";

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_pass http://pulswerk:5000/plswk/;
    }

    location = / { return 301 /plswk/; }
}

# ── Port 81: Administrator (admins group) ──────────────────────────
server {
    listen 81;
    server_name _;

    location /plswk/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Simulated Authelia identity headers
        proxy_set_header Remote-User       "admin";
        proxy_set_header Remote-Name       "Test Admin";
        proxy_set_header Remote-Email      "admin@pulswerk.local";
        proxy_set_header Remote-Groups     "admins,users,viewers";

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_pass http://pulswerk:5000/plswk/;
    }

    location = / { return 301 /plswk/; }
}
